<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Página Não Encontrada | WW21 Construção a Seco</title>
    <meta name="description" content="A página que você procura não existe. Volte para a página inicial da WW21 - Construção a Seco.">
    <!-- Não queremos que o google indexe a página de erro 404 -->
    <meta name="robots" content="noindex, follow">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a; 
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            text-align: center; 
            padding: 20px; 
        }
        .container {
            max-width: 600px;
        }
        h1 { 
            font-size: 8rem; 
            color: #a67c52; 
            margin: 0; 
            line-height: 1;
        }
        h2 {
            font-size: 2rem;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        p { 
            font-size: 1.1rem; 
            color: #cbd5e1; 
            margin-bottom: 40px; 
            line-height: 1.6;
        }
        a { 
            background-color: #a67c52; 
            color: white; 
            text-decoration: none; 
            padding: 16px 36px; 
            border-radius: 9999px; 
            font-weight: 600; 
            transition: all 0.3s ease; 
            display: inline-block;
        }
        a:hover { 
            background-color: #ffffff; 
            color: #0f172a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Página Não Encontrada</h2>
        <p>A página que você tentou acessar não existe, foi removida ou o endereço está incorreto. Mas não se preocupe, o seu projeto continua em boas mãos!</p>
        <a href="/">Voltar ao Início</a>
    </div>
</body>
</html>
